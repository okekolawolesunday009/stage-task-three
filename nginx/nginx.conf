worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Trust X-Forwarded-For so we log the REAL client IP ───────────────
    real_ip_header     X-Forwarded-For;
    real_ip_recursive  on;
    set_real_ip_from   0.0.0.0/0;

    # ── Access log format: ip timestamp method path status bytes ──────────
    log_format  combined_real
        '$remote_addr - $remote_user [$time_local] '
        '"$request" $status $body_bytes_sent '
        '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log combined_real;

    sendfile        on;
    keepalive_timeout 65;

    # ── Nextcloud upstream ────────────────────────────────────────────────
    upstream nextcloud_backend {
        server nextcloud:80;
    }

    server {
        listen 80;
        server_name _;

        # ── Security headers ──────────────────────────────────────────────
        add_header X-Content-Type-Options   nosniff;
        add_header X-XSS-Protection        "1; mode=block";
        add_header X-Frame-Options         SAMEORIGIN;
        add_header Referrer-Policy         no-referrer;

        client_max_body_size 512M;

        location / {
            proxy_pass         http://nextcloud_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;

            # Required for Nextcloud WebDAV
            proxy_buffering    off;
        }

        # ── Nextcloud well-known redirects ────────────────────────────────
        location /.well-known/carddav {
            return 301 $scheme://$host/remote.php/dav;
        }
        location /.well-known/caldav {
            return 301 $scheme://$host/remote.php/dav;
        }
    }
}
