worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Trust X-Forwarded-For so we log the REAL client IP ───────────────
    real_ip_header     X-Forwarded-For;
    real_ip_recursive  on;
    set_real_ip_from   0.0.0.0/0;

    # ── Access log format: ip timestamp method path status bytes ──────────
    log_format  combined_real
        '$remote_addr - $remote_user [$time_local] '
        '"$request" $status $body_bytes_sent '
        '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log combined_real;

    sendfile        on;
    keepalive_timeout 65;

    # ── Nextcloud upstream ────────────────────────────────────────────────
    upstream nextcloud_backend {
        server nextcloud:80;
    }

    # ── HTTP server (redirect to HTTPS) ──────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Allow certbot validation
        location /.well-known/acme-challenge/ {
            root /var/www/letsencrypt;
        }

        # Redirect all other traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server (main) ───────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL certificates — certbot will provision these
        # For localhost, use self-signed; for real domains, Let's Encrypt certs
        ssl_certificate     /etc/letsencrypt/live/localhost/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/localhost/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # ── Security headers ──────────────────────────────────────────────
        add_header X-Content-Type-Options   nosniff;
        add_header X-XSS-Protection        "1; mode=block";
        add_header X-Frame-Options         SAMEORIGIN;
        add_header Referrer-Policy         no-referrer;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        client_max_body_size 512M;

        location / {
            proxy_pass         http://nextcloud_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 300s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;

            # Required for Nextcloud WebDAV
            proxy_buffering    off;
        }

        # ── Nextcloud well-known redirects ────────────────────────────────
        location /.well-known/carddav {
            return 301 https://$host/remote.php/dav;
        }
        location /.well-known/caldav {
            return 301 https://$host/remote.php/dav;
        }
    }
}
