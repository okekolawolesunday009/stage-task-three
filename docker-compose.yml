version: "3.9"

services:

  # ── Nextcloud app ──────────────────────────────────────────────────────
  nextcloud:
    image: nextcloud:28-apache          # use the image tag given in the task
    container_name: nextcloud
    restart: unless-stopped
    environment:
      NEXTCLOUD_ADMIN_USER:     ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: "${SERVER_IP} localhost"
      MYSQL_HOST:     db
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER:     ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - nextcloud_data:/var/www/html
    depends_on:
      - db
    networks:
      - internal

  # ── MariaDB ───────────────────────────────────────────────────────────
  db:
    image: mariadb:10.11
    container_name: nextcloud_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - internal

  # ── Nginx reverse proxy ───────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx_proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
    depends_on:
      - nextcloud
    networks:
      - internal

  py-app:
    build:
      context: ./py-app
      dockerfile: Dockerfile
    container_name: hng_py_app
    restart: unless-stopped
    working_dir: /app
    env_file:
      - ./py-app/.env
    volumes:
      - ./py-app:/app
      - HNG-nginx-logs:/var/log/nginx:ro
    command: ["python", "main.py"]
    depends_on:
      - nginx
    ports:
      - "8080:8080"
    networks:
      - internal

volumes:
  nextcloud_data:
  db_data:
  HNG-nginx-logs:

networks:
  internal:
    driver: bridge
